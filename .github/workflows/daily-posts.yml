name: Daily posts

on:
  schedule:
    # GitHub Actionsのcronは不安定なため、朝の時間帯に複数回スケジュール
    # スクリプト側で「今日の記事が既にあれば終了」する重複防止を入れている
    - cron: '17 22 * * *' # JST 07:17
    - cron: '17 23 * * *' # JST 08:17
    - cron: '17 0 * * *'  # JST 09:17
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: npm run generate

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog
          if git diff --staged --quiet; then
            echo "差分なし: コミットをスキップ"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: daily posts $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # GITHUB_TOKENによるpushは他のワークフローをトリガーしないため、
      # ビルド＆デプロイをこのジョブ内で続けて実行する
      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
